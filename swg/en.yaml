mdmIntuneSteps: "<li>Endpoint security → <strong>Certificate profiles</strong> → Create → <strong>Trusted certificate</strong></li><li>Upload the CA cert (PEM) from the button above, or set <strong>SCEP URL</strong> to the URL shown above</li><li>Assign to the device group running the allodswg agent</li><li>For TLS inspection on Android: set <strong>Always-on VPN</strong> and point to your agent enrollment URL</li>"
mdmJamfSteps: "<li>Configuration Profiles → New → <strong>Certificate</strong> payload</li><li>Set <strong>SCEP</strong> as certificate type and enter the SCEP URL above, or upload the PEM directly</li><li>Add a <strong>VPN</strong> payload pointing to your allodswg controller if using iOS Network Extension</li><li>Scope to the relevant device group and deploy</li>"
mdmWorkspaceOneSteps: "<li>Resources → Profiles → Add → Add Profile → select platform (Android or iOS)</li><li>Add a <strong>Credentials</strong> payload → set source to <strong>Defined Certificate Authority</strong></li><li>Under Certificate Authority, choose <strong>SCEP</strong> and enter the SCEP URL shown above</li><li>Alternatively: set source to <strong>Upload</strong> and upload the PEM from the button above</li><li>Add a <strong>VPN</strong> payload if deploying the allodswg agent as an always-on VPN</li><li>Assign to the relevant Smart Group and publish</li>"
mdmFleetSteps: "<li>Fleet → <strong>Controls</strong> → <strong>OS settings</strong> → Add profile (macOS / iOS / Android)</li><li>Add a <strong>SCEP</strong> payload → set URL to the SCEP URL shown above</li><li>Windows support in FleetDM is not yet complete - use <strong>Download CA cert</strong> above for manual installation on Windows</li><li>Assign the profile to the relevant team and deploy</li>"
