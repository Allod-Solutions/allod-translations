mdmIntuneSteps: "<li>Seguridad de endpoints → <strong>Perfiles de certificado</strong> → Crear → <strong>Certificado de confianza</strong></li><li>Suba el certificado CA (PEM) con el botón de arriba o defina la <strong>URL SCEP</strong> con la URL mostrada arriba</li><li>Asigne al grupo de dispositivos que ejecuta el agente allodswg</li><li>Para inspección TLS en Android: active <strong>VPN siempre activa</strong> y apunte a la URL de inscripción del agente</li>"
mdmJamfSteps: "<li>Perfiles de configuración → Nuevo → payload de <strong>Certificado</strong></li><li>Seleccione <strong>SCEP</strong> como tipo de certificado e introduzca la URL SCEP de arriba, o suba el PEM directamente</li><li>Añada un payload de <strong>VPN</strong> apuntando al controlador allodswg si usa iOS Network Extension</li><li>Limite al grupo de dispositivos relevante y despliegue</li>"
mdmWorkspaceOneSteps: "<li>Recursos → Perfiles → Añadir → Añadir perfil → seleccione la plataforma (Android o iOS)</li><li>Añada un payload de <strong>Credenciales</strong> → fuente: <strong>Autoridad de certificación definida</strong></li><li>En Autoridad de certificación, elija <strong>SCEP</strong> e introduzca la URL SCEP de arriba</li><li>Alternativa: fuente <strong>Subir</strong> y suba el PEM de arriba</li><li>Añada un payload de <strong>VPN</strong> si el agente se despliega como VPN siempre activa</li><li>Asigne al Smart Group relevante y publique</li>"
mdmFleetSteps: "<li>Fleet → <strong>Controls</strong> → <strong>OS settings</strong> → Añadir perfil (macOS / iOS / Android)</li><li>Añada un payload <strong>SCEP</strong> → defina la URL a la URL SCEP mostrada arriba</li><li>El soporte de Windows en FleetDM aún no está completo - use <strong>Descargar certificado CA</strong> arriba para instalación manual en Windows</li><li>Asigne el perfil al equipo relevante y despliegue</li>"
