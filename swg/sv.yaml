scepUrlHint: "Kompatibel med Microsoft Intune, Jamf Pro, FleetDM, VMware Workspace ONE och alla RFC 8894 SCEP-klienter."
mdmIntuneSteps: "<li>Endpoint security → <strong>Certifikatprofiler</strong> → Skapa → <strong>Betrott certifikat</strong></li><li>Ladda upp CA-cert (PEM) med knappen ovan, eller ange <strong>SCEP-URL</strong> till URL:en ovan</li><li>Tilldela till enhetsgruppen som kör allodswg-agenten</li><li>För TLS-inspektion på Android: aktivera <strong>Alltid-på-VPN</strong> och peka mot din agentregistreringsadress</li>"
mdmJamfSteps: "<li>Konfigurationsprofiler → Ny → <strong>Certifikat</strong>-payload</li><li>Välj <strong>SCEP</strong> som certifikattyp och ange SCEP-URL:en ovan, eller ladda upp PEM-filen direkt</li><li>Lägg till ett <strong>VPN</strong>-payload som pekar mot din allodswg-kontroller om du använder iOS Network Extension</li><li>Begränsa till relevant enhetsgrupp och distribuera</li>"
mdmWorkspaceOneSteps: "<li>Resurser → Profiler → Lägg till → Lägg till profil → välj plattform (Android eller iOS)</li><li>Lägg till ett <strong>Autentiseringsuppgifter</strong>-payload → sätt källa till <strong>Definierad certifikatutfärdare</strong></li><li>Under Certifikatutfärdare, välj <strong>SCEP</strong> och ange SCEP-URL:en ovan</li><li>Alternativt: sätt källa till <strong>Ladda upp</strong> och ladda upp PEM-filen ovan</li><li>Lägg till ett <strong>VPN</strong>-payload om agenten distribueras som alltid-på-VPN</li><li>Tilldela till relevant Smart Group och publicera</li>"
mdmFleetSteps: "<li>Fleet → <strong>Controls</strong> → <strong>OS settings</strong> → Lägg till profil (macOS / iOS / Android)</li><li>Lägg till ett <strong>SCEP</strong>-payload → ange URL:en till SCEP-URL:en ovan</li><li>Windows-stöd i FleetDM är ännu inte komplett - använd <strong>Ladda ner CA-cert</strong> ovan för manuell installation på Windows</li><li>Tilldela profilen till relevant team och distribuera</li>"
