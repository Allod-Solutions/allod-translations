mdmIntuneSteps: "<li>Sécurité des points de terminaison → <strong>Profils de certificat</strong> → Créer → <strong>Certificat approuvé</strong></li><li>Téléversez le certificat CA (PEM) via le bouton ci-dessus, ou définissez l’<strong>URL SCEP</strong> à l’URL affichée ci-dessus</li><li>Assignez au groupe d’appareils exécutant l’agent allodswg</li><li>Pour l’inspection TLS sur Android : activez le <strong>VPN permanent</strong> et pointez vers l’URL d’enrôlement</li>"
mdmJamfSteps: "<li>Profils de configuration → Nouveau → payload <strong>Certificat</strong></li><li>Définissez <strong>SCEP</strong> comme type de certificat et entrez l’URL SCEP ci-dessus, ou téléversez le PEM directement</li><li>Ajoutez un payload <strong>VPN</strong> pointant vers votre contrôleur allodswg si vous utilisez iOS Network Extension</li><li>Limitez au groupe d’appareils concerné et déployez</li>"
mdmWorkspaceOneSteps: "<li>Ressources → Profils → Ajouter → Ajouter un profil → sélectionnez la plateforme (Android ou iOS)</li><li>Ajoutez un payload <strong>Informations d’identification</strong> → source : <strong>Autorité de certification définie</strong></li><li>Sous Autorité de certification, choisissez <strong>SCEP</strong> et entrez l’URL SCEP ci-dessus</li><li>Alternative : source <strong>Téléverser</strong> et uploadez le PEM ci-dessus</li><li>Ajoutez un payload <strong>VPN</strong> si l’agent est déployé en VPN permanent</li><li>Assignez au Smart Group concerné et publiez</li>"
mdmFleetSteps: "<li>Fleet → <strong>Controls</strong> → <strong>OS settings</strong> → Ajouter un profil (macOS / iOS / Android)</li><li>Ajoutez un payload <strong>SCEP</strong> → définissez l’URL à l’URL SCEP affichée ci-dessus</li><li>La prise en charge Windows dans FleetDM est encore incomplète — utilisez <strong>Télécharger le certificat CA</strong> ci-dessus pour une installation manuelle sur Windows</li><li>Assignez le profil à l’équipe concernée et déployez</li>"
