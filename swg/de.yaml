mdmDistributionDesc: "Richten Sie Ihr MDM auf die SCEP-URL, um das Proxy-CA automatisch zu verteilen. Kein manueller Upload erforderlich."
scepUrl: "SCEP-URL"
scepUrlHint: "Kompatibel mit Microsoft Intune, Jamf Pro, FleetDM, VMware Workspace ONE und allen RFC 8894 SCEP-Clients."
mdmIntuneSteps: "<li>Endpunktsicherheit → <strong>Zertifikatprofile</strong> → Erstellen → <strong>Vertrauenswürdiges Zertifikat</strong></li><li>CA-Zertifikat (PEM) über die Schaltfläche oben hochladen oder <strong>SCEP-URL</strong> auf die oben angezeigte URL setzen</li><li>Der Gerätegruppe zuweisen, die den allodswg-Agent ausführt</li><li>Für TLS-Inspektion auf Android: <strong>Always-on-VPN</strong> aktivieren und auf die Agent-Enrollment-URL zeigen</li>"
mdmJamfSteps: "<li>Konfigurationsprofile → Neu → <strong>Zertifikat</strong>-Payload</li><li><strong>SCEP</strong> als Zertifikattyp wählen und SCEP-URL oben eintragen oder PEM direkt hochladen</li><li><strong>VPN</strong>-Payload hinzufügen, der auf Ihren allodswg-Controller zeigt, wenn iOS Network Extension verwendet wird</li><li>Auf die relevante Gerätegruppe beschränken und bereitstellen</li>"
mdmWorkspaceOneSteps: "<li>Ressourcen → Profile → Hinzufügen → Profil hinzufügen → Plattform wählen (Android oder iOS)</li><li><strong>Anmeldeinformationen</strong>-Payload hinzufügen → Quelle: <strong>Definierte Zertifizierungsstelle</strong></li><li>Unter Zertifizierungsstelle <strong>SCEP</strong> wählen und SCEP-URL oben eintragen</li><li>Alternative: Quelle <strong>Hochladen</strong> und PEM oben hochladen</li><li><strong>VPN</strong>-Payload hinzufügen, wenn der Agent als Always-on-VPN bereitgestellt wird</li><li>Der relevanten Smart Group zuweisen und veröffentlichen</li>"
mdmFleetSteps: "<li>Fleet → <strong>Controls</strong> → <strong>OS settings</strong> → Profil hinzufügen (macOS / iOS / Android)</li><li><strong>SCEP</strong>-Payload hinzufügen → URL auf die oben angezeigte SCEP-URL setzen</li><li>Windows-Unterstützung in FleetDM ist noch unvollständig - <strong>CA-Zertifikat herunterladen</strong> oben für manuelle Installation unter Windows verwenden</li><li>Profil dem relevanten Team zuweisen und bereitstellen</li>"
